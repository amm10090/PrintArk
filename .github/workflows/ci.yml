name: CI

# 质检 + 构建:push 到 main / 任意 PR / 打 v* 标签时触发。
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: 质检(build + test)
    # Package.swift 声明 swift-tools-version 6.4,需 Xcode 26 级工具链;
    # macos-15 上的 Xcode 16/Swift 6.0 无法解析该 tools-version,故固定 macos-26。
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  package:
    name: 构建 .app 产物
    needs: quality
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # build_and_run.sh 默认会启动 .app;CI 用 build 模式只打包不运行。
      - name: Build .app bundle
        run: ./script/build_and_run.sh build

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintArk-app
          path: dist/PrintArk.app
          if-no-files-found: error
