name: CI

# 质检 + 构建:push 到 main / 任意 PR / 打 v* 标签时触发。
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# release job 需要写权限来创建 Release 并上传资产。
permissions:
  contents: write

jobs:
  quality:
    name: 质检(build + test)
    # Package.swift 声明 swift-tools-version 6.3;GitHub 现有 runner 最新工具链
    # 为 macos-26 的 Xcode 26.x(Swift tools 6.3.x),故固定 macos-26 + 最新 Xcode。
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  package:
    name: 构建 .app 产物
    needs: quality
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # build_and_run.sh 默认会启动 .app;CI 用 build 模式只打包不运行。
      - name: Build .app bundle
        run: ./script/build_and_run.sh build

      # Release 资产必须是文件;.app 是目录,压缩成 zip(保留符号链接/权限用 ditto)。
      - name: Zip .app bundle
        run: |
          ditto -c -k --keepParent dist/PrintArk.app dist/PrintArk.app.zip
          ls -lh dist/PrintArk.app.zip

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintArk-app
          path: dist/PrintArk.app.zip
          if-no-files-found: error

  release:
    name: 发布 Release(附构建产物)
    needs: package
    # 仅在打 v* 标签时发布。
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build .app bundle
        run: ./script/build_and_run.sh build

      # 资产名带版本号(取自 tag,如 PrintArk-v1.1.0.app.zip),便于区分各版本产物。
      - name: Zip .app bundle (versioned)
        run: |
          ditto -c -k --keepParent dist/PrintArk.app "dist/PrintArk-${GITHUB_REF_NAME}.app.zip"
          ls -lh dist/PrintArk-${GITHUB_REF_NAME}.app.zip

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/PrintArk-${{ github.ref_name }}.app.zip
          body: |
            ## 印舟 PrintArk ${{ github.ref_name }}

            macOS 菜单栏原生打印服务,替代菜鸟 / 淘宝「X Print」Adobe 插件。

            ### 📦 安装

            1. 下载下方的 `PrintArk-${{ github.ref_name }}.app.zip` 并解压。
            2. 把 `PrintArk.app` 拖入「应用程序」。
            3. **首次打开前必须执行**以下命令(见下方「为什么」):
               ```bash
               sudo xattr -cr /Applications/PrintArk.app
               ```
            4. 然后正常双击打开即可。

            ### ⚠️ 为什么会提示「已损坏,无法打开」

            本 App **尚未经 Apple 开发者签名与公证**。从网络下载的未签名 App 会被 macOS Gatekeeper
            打上 `com.apple.quarantine` 隔离属性,双击时系统会误报「已损坏」。上面的 `xattr -cr`
            命令仅清除 **PrintArk.app 这一个 App** 的隔离属性(已限定路径,不影响其他应用),
            清除后即可正常运行。这是未签名 App 的预期行为,非程序本身损坏。

            ### 改动明细

            <!-- 以下为本版本相对上一 tag 的提交与 PR 自动汇总 -->


