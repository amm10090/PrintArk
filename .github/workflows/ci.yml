name: CI

# 质检 + 构建:push 到 main / 任意 PR / 打 v* 标签时触发。
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# release job 需要写权限来创建 Release 并上传资产。
permissions:
  contents: write

jobs:
  quality:
    name: 质检(build + test)
    # Package.swift 声明 swift-tools-version 6.3;GitHub 现有 runner 最新工具链
    # 为 macos-26 的 Xcode 26.x(Swift tools 6.3.x),故固定 macos-26 + 最新 Xcode。
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  package:
    name: 构建 .app 产物
    needs: quality
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # build_and_run.sh 默认会启动 .app;CI 用 build 模式只打包不运行。
      - name: Build .app bundle
        run: ./script/build_and_run.sh build

      # Release 资产必须是文件;.app 是目录,压缩成 zip(保留符号链接/权限用 ditto)。
      - name: Zip .app bundle
        run: |
          ditto -c -k --keepParent dist/PrintArk.app dist/PrintArk.app.zip
          ls -lh dist/PrintArk.app.zip

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintArk-app
          path: dist/PrintArk.app.zip
          if-no-files-found: error

  release:
    name: 发布 Release(附构建产物)
    needs: package
    # 仅在打 v* 标签时发布。
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build .app bundle
        run: ./script/build_and_run.sh build

      # 资产名带版本号(取自 tag,如 PrintArk-v1.1.0.app.zip),便于区分各版本产物。
      - name: Zip .app bundle (versioned)
        run: |
          ditto -c -k --keepParent dist/PrintArk.app "dist/PrintArk-${GITHUB_REF_NAME}.app.zip"
          ls -lh dist/PrintArk-${GITHUB_REF_NAME}.app.zip

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/PrintArk-${{ github.ref_name }}.app.zip

